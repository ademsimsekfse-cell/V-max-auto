{% extends "base.html" %}
{% block title %}Yeni Teklif - {{ record.record_no }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="mb-0 fw-bold"><i class="bi bi-file-earmark-text me-2"></i>Yeni Teklif - {{ record.record_no }}</h4>
  <a href="{{ url_for('service_detail', rid=record.id) }}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Geri
  </a>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-body p-4">
    <form method="POST">
      <div class="row g-3 mb-3">
        <div class="col-md-3">
          <label class="form-label fw-semibold">KDV Oranı (%)</label>
          <input type="number" id="tax_rate" name="tax_rate" class="form-control" value="18" min="0" max="100" step="1">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">İndirim (₺)</label>
          <input type="number" id="discount" name="discount" class="form-control" value="0" min="0" step="0.01">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">Geçerlilik Tarihi</label>
          <input type="date" name="valid_until" class="form-control">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">Durum</label>
          <select name="status" class="form-select">
            <option value="draft">Taslak</option>
            <option value="sent">Gönderildi</option>
            <option value="approved">Onaylandı</option>
          </select>
        </div>
      </div>

      <h6 class="fw-bold mb-3">Teklif Kalemleri</h6>
      <div class="table-responsive">
        <table class="table table-bordered" id="itemsTable">
          <thead class="table-light">
            <tr>
              <th style="width:40%">Açıklama</th>
              <th>Tür</th>
              <th style="width:10%">Adet</th>
              <th style="width:15%">Birim Fiyat (₺)</th>
              <th style="width:15%">Toplam (₺)</th>
              <th style="width:5%"></th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><input type="text" class="form-control form-control-sm" name="item_description[]" required></td>
              <td><select class="form-select form-select-sm" name="item_type[]"><option value="service">Hizmet</option><option value="part">Parça</option></select></td>
              <td><input type="number" class="form-control form-control-sm item-qty" name="item_quantity[]" value="1" min="0.01" step="0.01"></td>
              <td><input type="number" class="form-control form-control-sm item-price" name="item_unit_price[]" value="0" min="0" step="0.01"></td>
              <td><input type="number" class="form-control form-control-sm item-total" name="item_total_price[]" value="0" readonly></td>
              <td><button type="button" class="btn btn-sm btn-danger" onclick="this.closest('tr').remove(); calculateGrandTotal()">×</button></td>
            </tr>
          </tbody>
        </table>
      </div>
      <button type="button" class="btn btn-outline-secondary btn-sm mb-3" onclick="addItemRow('itemsTable')">
        <i class="bi bi-plus-lg me-1"></i>Kalem Ekle
      </button>

      <div class="row g-2 justify-content-end mb-3">
        <div class="col-md-3">
          <label class="form-label fw-semibold">Ara Toplam (₺)</label>
          <input type="number" id="total_amount" name="total_amount" class="form-control" readonly value="0">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">KDV Tutarı (₺)</label>
          <input type="number" id="tax_amount" name="tax_amount" class="form-control" readonly value="0">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">Son Tutar (₺)</label>
          <input type="number" id="final_amount" name="final_amount" class="form-control fw-bold" readonly value="0">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Notlar</label>
        <textarea name="notes" class="form-control" rows="2"></textarea>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-save me-1"></i>Teklifi Kaydet
        </button>
        <a href="{{ url_for('service_detail', rid=record.id) }}" class="btn btn-outline-secondary">İptal</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.item-qty, .item-price').forEach(function(el) {
    el.addEventListener('input', calculateItemTotal.bind(el));
  });
  document.getElementById('tax_rate').addEventListener('input', calculateGrandTotal);
  document.getElementById('discount').addEventListener('input', calculateGrandTotal);
});
</script>
{% endblock %}
