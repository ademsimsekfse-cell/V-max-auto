<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>V-MAX OTOMOTİV - Giriş</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
  <div class="logo-watermark" aria-hidden="true">
    <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="" style="width:100%">
  </div>
  <div class="content-wrapper d-flex align-items-center justify-content-center" style="min-height:100vh">
    <div class="col-md-4 col-sm-10">
      <div class="card shadow-lg border-0" style="border-radius:16px; overflow:hidden;">
        <div class="card-header text-center py-4" style="background:var(--primary)">
          <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Logo" style="height:60px; margin-bottom:10px">
          <h4 class="text-white fw-bold mb-0 letter-spacing">V-MAX OTOMOTİV</h4>
          <small class="text-white-50">Servis Yönetim Sistemi</small>
        </div>
        <div class="card-body p-4">
          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show py-2" role="alert">
                  {{ message }}
                  <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
              {% endfor %}
            {% endif %}
          {% endwith %}
          <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
              <label class="form-label fw-semibold"><i class="bi bi-person me-1"></i>Kullanıcı Adı</label>
              <input type="text" name="username" class="form-control form-control-lg" placeholder="Kullanıcı adınız" required autofocus>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold"><i class="bi bi-lock me-1"></i>Şifre</label>
              <input type="password" name="password" class="form-control form-control-lg" placeholder="Şifreniz" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg fw-bold" style="background:var(--primary); border-color:var(--primary)">
              <i class="bi bi-box-arrow-in-right me-2"></i>Giriş Yap
            </button>
          </form>
        </div>
        <div class="card-footer text-center text-muted py-3" style="font-size:0.82rem">
          &copy; {{ now.year }} V-MAX OTOMOTİV — Tüm Hakları Saklıdır
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
