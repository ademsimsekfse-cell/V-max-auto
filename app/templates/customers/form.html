{% extends "base.html" %}
{% block title %}{% if customer %}Müşteri Düzenle{% else %}Yeni Müşteri{% endif %}{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{% if customer %}✏️ Müşteri Düzenle{% else %}➕ Yeni Müşteri{% endif %}</h1>
  <a href="{{ url_for('customers.list_customers') }}" class="btn btn-secondary">← Geri</a>
</div>
<form method="post" class="form-card">
  <label>Ad Soyad *</label>
  <input type="text" name="name" value="{{ customer.name if customer else '' }}" required />

  <label>Telefon *</label>
  <input type="tel" name="phone" value="{{ customer.phone if customer else '' }}" required />

  <label>E-posta</label>
  <input type="email" name="email" value="{{ customer.email if customer else '' }}" />

  <label>Adres</label>
  <textarea name="address">{{ customer.address if customer else '' }}</textarea>

  <button type="submit" class="btn btn-primary">💾 Kaydet</button>
</form>
{% endblock %}
