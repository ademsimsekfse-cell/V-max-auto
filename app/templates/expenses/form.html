{% extends "base.html" %}
{% block title %}{% if expense %}Gider Düzenle{% else %}Yeni Gider{% endif %}{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{% if expense %}✏️ Gider Düzenle{% else %}➕ Yeni Gider{% endif %}</h1>
  <a href="{{ url_for('expenses.list_expenses') }}" class="btn btn-secondary">← Geri</a>
</div>
<form method="post" class="form-card">
  <label>Kategori *</label>
  <select name="category" required>
    {% for cat in categories %}
    <option value="{{ cat }}" {% if expense and expense.category == cat %}selected{% endif %}>{{ cat }}</option>
    {% endfor %}
  </select>

  <label>Açıklama *</label>
  <textarea name="description" required>{{ expense.description if expense else '' }}</textarea>

  <label>Tutar (₺) *</label>
  <input type="number" name="amount" step="0.01" min="0" value="{{ expense.amount if expense else '' }}" required />

  <label>Tarih *</label>
  <input type="date" name="date" value="{{ expense.date.isoformat() if expense else '' }}" required />

  <button type="submit" class="btn btn-primary">💾 Kaydet</button>
</form>
{% endblock %}
