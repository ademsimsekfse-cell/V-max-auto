{% extends "base.html" %}
{% block title %}{% if order %}Servis Emri Düzenle{% else %}Yeni Servis Emri{% endif %}{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{% if order %}✏️ Servis Emri Düzenle{% else %}➕ Yeni Servis Emri{% endif %}</h1>
  <a href="{{ url_for('service_orders.list_orders') }}" class="btn btn-secondary">← Geri</a>
</div>
<form method="post" class="form-card">
  <label>Araç *</label>
  <select name="vehicle_id" required>
    {% for v in vehicles %}
    <option value="{{ v.id }}" {% if order and order.vehicle_id == v.id %}selected{% endif %}>{{ v.plate }} – {{ v.brand }} {{ v.model }}</option>
    {% endfor %}
  </select>

  <label>Açıklama *</label>
  <textarea name="description" required rows="3">{{ order.description if order else '' }}</textarea>

  <label>Durum</label>
  <select name="status">
    {% for s in statuses %}
    <option value="{{ s }}" {% if order and order.status == s %}selected{% endif %}>{{ s }}</option>
    {% endfor %}
  </select>

  <label>İşçilik Ücreti (₺)</label>
  <input type="number" name="labor_cost" step="0.01" min="0" value="{{ order.labor_cost if order else '0' }}" />

  <label>Parça Ücreti (₺)</label>
  <input type="number" name="parts_cost" step="0.01" min="0" value="{{ order.parts_cost if order else '0' }}" />

  <button type="submit" class="btn btn-primary">💾 Kaydet</button>
</form>
{% endblock %}
